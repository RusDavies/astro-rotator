name: checks

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions/setup-python v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project and audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit==2.10.1

      - name: Run checks
        run: scripts/check.sh

      - name: Run dependency audit
        run: scripts/security_check.sh
